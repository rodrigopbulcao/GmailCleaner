<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gmail Cleaner — Rodrigo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #ff4d4d;
    --accent2: #ff8c42;
    --green: #4ade80;
    --blue: #60a5fa;
    --amber: #fbbf24;
    --purple: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--muted); }

  #auth-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #auth-btn:hover { opacity: 0.85; }
  #auth-btn:disabled { opacity: 0.4; cursor: default; }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.35rem 1rem 0.35rem 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .user-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

  #login-screen {
    max-width: 480px;
    margin: 6rem auto;
    text-align: center;
  }
  #login-screen h1 { font-size: 2rem; font-weight: 300; margin-bottom: 1rem; }
  #login-screen p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }

  #main { display: none; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 1.75rem; font-weight: 600; }

  .categories { display: flex; flex-direction: column; gap: 10px; }

  .cat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .cat-card:hover { border-color: #444; }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.25rem;
    cursor: pointer;
  }

  .cat-icon { font-size: 1.1rem; width: 32px; text-align: center; }

  .cat-info { flex: 1; }
  .cat-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 2px; }
  .cat-desc { font-size: 0.78rem; color: var(--muted); }

  .cat-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 99px;
    color: var(--muted);
    min-width: 60px;
    text-align: center;
  }

  .delete-btn {
    border: none;
    padding: 0.5rem 1.1rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .delete-btn.danger { background: rgba(255,77,77,0.15); color: var(--accent); border: 1px solid rgba(255,77,77,0.3); }
  .delete-btn.danger:hover { background: rgba(255,77,77,0.25); }
  .delete-btn.done { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.3); cursor: default; }
  .delete-btn.loading { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); cursor: wait; }

  .progress-bar {
    height: 2px;
    background: var(--border);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.3s;
  }

  .log-panel {
    margin-top: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    max-height: 200px;
    overflow-y: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    display: none;
  }
  .log-line { margin-bottom: 4px; }
  .log-line.success { color: var(--green); }
  .log-line.error { color: var(--accent); }
  .log-line.info { color: var(--blue); }

  .nuke-btn {
    display: block;
    width: 100%;
    margin-top: 1.5rem;
    padding: 0.9rem;
    background: rgba(255,77,77,0.1);
    border: 1px solid rgba(255,77,77,0.4);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nuke-btn:hover { background: rgba(255,77,77,0.2); }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(74,222,128,0.4); color: var(--green); }
  .toast.error { border-color: rgba(255,77,77,0.4); color: var(--accent); }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">gmail<span>/</span>cleaner</div>
  <div id="header-right">
    <button id="auth-btn" onclick="handleAuth()">Conectar com Google</button>
  </div>
</header>

<div id="login-screen">
  <h1>Limpe sua caixa de entrada.</h1>
  <p>Conecte sua conta Google e delete emails em lote por categoria — spam, promoções, notificações — tudo de uma vez.</p>
  <button id="auth-btn-big" onclick="handleAuth()" style="background:var(--accent);color:#fff;border:none;padding:0.8rem 2rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;">
    Conectar com Google →
  </button>
</div>

<div id="main">
  <div class="summary-bar">
    <div class="stat"><div class="stat-label">Total analisado</div><div class="stat-value" id="stat-total" style="color:var(--text)">—</div></div>
    <div class="stat"><div class="stat-label">Deletados</div><div class="stat-value" id="stat-deleted" style="color:var(--accent)">0</div></div>
    <div class="stat"><div class="stat-label">Categorias</div><div class="stat-value" id="stat-cats" style="color:var(--blue)">8</div></div>
    <div class="stat"><div class="stat-label">Status</div><div class="stat-value" id="stat-status" style="color:var(--green);font-size:1rem;padding-top:6px;">Pronto</div></div>
  </div>

  <div class="categories" id="categories"></div>

  <button class="nuke-btn" onclick="deleteAll()">⚠ Deletar tudo de uma vez (todas as categorias)</button>

  <div class="log-panel" id="log"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID = '758332085837-qcvrat7138trtb8b4bjustf565q2vta3.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/gmail.modify';

const CATEGORIES = [
  {
    id: 'spam_dating',
    icon: '🗑',
    name: 'Spam / Dating',
    desc: 'MeuPatrocinio e similares — spam puro, 30+ duplicatas',
    color: 'var(--accent)',
    query: 'from:meupatrocinio.com OR from:jessica@meupatrocinio.com',
    count: '30+'
  },
  {
    id: 'retail',
    icon: '🛍',
    name: 'Promoções de lojas',
    desc: 'Vans, SHEIN, Adidas, Growth Supplements, iFood, OLX, Foxbit...',
    color: 'var(--accent2)',
    query: 'from:vans.com.br OR from:shein.com OR from:growthsupplements.com.br OR from:foxbit.com.br OR from:adidas.com OR from:yuool.com.br OR from:fila.com.br OR from:boxerbeers.com OR from:clickbus.com OR from:olx.com.br OR from:ifood.com.br OR from:emma-sleep.com OR from:arzopa.com OR from:casaevideo.com.br OR from:hangar33.com.br OR from:picpay.com marketing',
    count: '40+'
  },
  {
    id: 'dating_apps',
    icon: '💬',
    name: 'Notificações de apps de relacionamento',
    desc: 'Hinge matches, Bumble cancelamento, MeuPatrocinio',
    color: 'var(--purple)',
    query: 'from:hinge.co OR from:bumble.com',
    count: '8+'
  },
  {
    id: 'travel_promo',
    icon: '✈',
    name: 'Promoções de viagem',
    desc: 'Hoteis.com, Hostelworld, Trip.com, Skyscanner (apenas promos)',
    color: 'var(--blue)',
    query: 'from:hoteis.com OR from:hostelworld.com OR from:trip.com OR from:skyscanner.com',
    count: '6+'
  },
  {
    id: 'gym',
    icon: '🏋',
    name: 'Academia / Fitness promos',
    desc: 'SmartFit, Tonus Gym, Race Bootcamp, Skyfit',
    color: 'var(--green)',
    query: 'from:smartfit.com OR from:tonusgym.com.br OR from:racebootcamp.com.br OR from:w12.com.br',
    count: '6+'
  },
  {
    id: 'edu_promo',
    icon: '📚',
    name: 'Promoções educacionais',
    desc: 'Conquer, FIA, IBMEC, FIAP, Beautiful.ai, TurboScribe, Coursera',
    color: 'var(--amber)',
    query: 'from:escolaconquer.com.br OR from:fiaonline.com.br OR from:ibmec.br OR from:fiap.com.br OR from:beautiful.ai OR from:turboscribe.ai OR from:coursera.org',
    count: '10+'
  },
  {
    id: 'social_notifs',
    icon: '🔔',
    name: 'Notificações sociais genéricas',
    desc: 'LinkedIn sugestões de follow, Facebook friend suggestions',
    color: 'var(--blue)',
    query: 'from:facebookmail.com OR (from:linkedin.com subject:follow)',
    count: '4+'
  },
  {
    id: 'ticketmaster',
    icon: '🎟',
    name: 'Ticketmaster / Entretenimento',
    desc: 'Newsletters e promos do Ticketmaster',
    color: 'var(--purple)',
    query: 'from:ticketmaster.com.br',
    count: '3+'
  }
];

let tokenClient;
let accessToken = null;
let totalDeleted = 0;
let catStates = {};

function handleAuth() {
  if (!window.google) {
    showToast('Carregando Google API...', 'info');
    loadGoogleAPI().then(() => initTokenClient());
    return;
  }
  if (accessToken) return;
  tokenClient.requestAccessToken();
}

function loadGoogleAPI() {
  return new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

function initTokenClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { showToast('Erro na autenticação', 'error'); return; }
      accessToken = resp.access_token;
      onLoggedIn();
    }
  });
  tokenClient.requestAccessToken();
}

function onLoggedIn() {
  fetch('https://www.googleapis.com/gmail/v1/users/me/profile', {
    headers: { Authorization: `Bearer ${accessToken}` }
  })
  .then(r => r.json())
  .then(p => {
    document.getElementById('header-right').innerHTML = `
      <div class="user-pill"><div class="user-dot"></div>${p.emailAddress}</div>`;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('stat-total').textContent = p.messagesTotal?.toLocaleString() || '—';
    renderCategories();
    showToast('Conectado com sucesso!', 'success');
  });
}

function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    catStates[cat.id] = 'idle';
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.id = `card-${cat.id}`;
    card.innerHTML = `
      <div class="cat-header">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${cat.name}</div>
          <div class="cat-desc">${cat.desc}</div>
        </div>
        <div class="cat-count" id="count-${cat.id}">~${cat.count}</div>
        <button class="delete-btn danger" id="btn-${cat.id}" onclick="deleteCategory('${cat.id}')">Deletar</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-${cat.id}"></div></div>
    `;
    container.appendChild(card);
  });
  document.getElementById('log').style.display = 'block';
}

async function deleteCategory(catId) {
  if (!accessToken) { showToast('Conecte sua conta primeiro', 'error'); return; }
  if (catStates[catId] !== 'idle') return;

  const cat = CATEGORIES.find(c => c.id === catId);
  catStates[catId] = 'loading';
  setBtn(catId, 'loading', 'Buscando...');
  log(`[${cat.name}] Buscando emails...`, 'info');

  try {
    const ids = await fetchAllIds(cat.query);
    if (ids.length === 0) {
      setBtn(catId, 'done', '✓ Vazio');
      document.getElementById(`count-${catId}`).textContent = '0';
      log(`[${cat.name}] Nenhum email encontrado.`, 'success');
      catStates[catId] = 'done';
      return;
    }

    document.getElementById(`count-${catId}`).textContent = ids.length;
    log(`[${cat.name}] ${ids.length} emails encontrados. Deletando...`, 'info');
    setBtn(catId, 'loading', `Deletando ${ids.length}...`);

    await trashBatch(ids, catId);

    totalDeleted += ids.length;
    document.getElementById('stat-deleted').textContent = totalDeleted;
    setBtn(catId, 'done', `✓ ${ids.length} deletados`);
    log(`[${cat.name}] ${ids.length} emails deletados.`, 'success');
    catStates[catId] = 'done';
    showToast(`${ids.length} emails de "${cat.name}" deletados`, 'success');
  } catch(e) {
    setBtn(catId, 'danger', 'Tentar de novo');
    log(`[${cat.name}] Erro: ${e.message}`, 'error');
    catStates[catId] = 'idle';
    showToast('Erro ao deletar — tente novamente', 'error');
  }
}

async function fetchAllIds(query) {
  let ids = [];
  let pageToken = null;
  do {
    const url = new URL('https://www.googleapis.com/gmail/v1/users/me/messages');
    url.searchParams.set('q', query);
    url.searchParams.set('maxResults', '500');
    if (pageToken) url.searchParams.set('pageToken', pageToken);
    const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
    const d = await r.json();
    if (d.messages) ids.push(...d.messages.map(m => m.id));
    pageToken = d.nextPageToken || null;
  } while (pageToken);
  return ids;
}

async function trashBatch(ids, catId) {
  const chunks = [];
  for (let i = 0; i < ids.length; i += 50) chunks.push(ids.slice(i, i + 50));
  let done = 0;
  for (const chunk of chunks) {
    await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/batchModify', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: chunk, addLabelIds: ['TRASH'], removeLabelIds: ['INBOX'] })
    });
    done += chunk.length;
    const pct = Math.round((done / ids.length) * 100);
    document.getElementById(`prog-${catId}`).style.width = `${pct}%`;
  }
}

async function deleteAll() {
  if (!accessToken) { showToast('Conecte sua conta primeiro', 'error'); return; }
  if (!confirm('Deletar TODAS as categorias de uma vez? Esta ação pode ser desfeita na Lixeira do Gmail por 30 dias.')) return;
  document.getElementById('stat-status').textContent = 'Deletando...';
  document.getElementById('stat-status').style.color = 'var(--accent)';
  for (const cat of CATEGORIES) {
    if (catStates[cat.id] === 'idle') await deleteCategory(cat.id);
  }
  document.getElementById('stat-status').textContent = 'Concluído';
  document.getElementById('stat-status').style.color = 'var(--green)';
  showToast('Limpeza completa!', 'success');
}

function setBtn(catId, state, text) {
  const btn = document.getElementById(`btn-${catId}`);
  btn.className = `delete-btn ${state}`;
  btn.textContent = text;
}

function log(msg, type = '') {
  const panel = document.getElementById('log');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `${new Date().toLocaleTimeString('pt-BR')} — ${msg}`;
  panel.appendChild(line);
  panel.scrollTop = panel.scrollHeight;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

window.onload = () => {
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { showToast('Erro na autenticação', 'error'); return; }
        accessToken = resp.access_token;
        onLoggedIn();
      }
    });
  };
  document.head.appendChild(s);
};
</script>
</body>
</html>
